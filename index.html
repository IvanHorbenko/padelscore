<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Padel">
<meta name="theme-color" content="#0f172a">
<title>Padel Score</title>
<style>
  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --accent: #c4f000;
    --accent-dark: #a8d000;
    --text: #f8fafc;
    --muted: #94a3b8;
    --serve: #c4f000;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    overscroll-behavior: none;
    -webkit-user-select: none;
    user-select: none;
  }
  body {
    display: flex;
    flex-direction: column;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    max-width: 600px;
    margin: 0 auto;
  }
  header {
    text-align: center;
    padding: 14px 0 6px;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  header .sub { font-size: 12px; color: var(--muted); font-weight: 500; margin-top: 2px; }

  /* Scoreboard */
  .board {
    margin: 8px 12px 0;
    background: var(--card);
    border-radius: 18px;
    overflow: hidden;
  }
  .board-head {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    padding: 10px 14px;
    font-size: 12px;
    color: var(--muted);
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .sets-cols { display: flex; gap: 14px; }
  .sets-cols span { width: 22px; text-align: center; }
  .sets-cols .pts { width: 50px; }

  .team-row {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    padding: 18px 14px;
    cursor: pointer;
    transition: background 0.1s;
  }
  .team-row:active { background: rgba(196,240,0,0.12); }
  .team-row.top { border-bottom: 1px solid rgba(255,255,255,0.06); }

  .team-info { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .serve-dot {
    width: 11px; height: 11px; border-radius: 50%;
    background: transparent; flex-shrink: 0;
    transition: background 0.15s;
  }
  .team-row.serving .serve-dot { background: var(--serve); box-shadow: 0 0 8px var(--accent); }
  .team-name {
    font-size: 19px; font-weight: 600; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis;
  }

  .scores { display: flex; gap: 14px; align-items: center; }
  .set-score {
    width: 22px; text-align: center; font-size: 22px; font-weight: 700;
    color: var(--muted);
  }
  .set-score.current { color: var(--text); }
  .point-score {
    width: 50px; text-align: center; font-size: 30px; font-weight: 800;
    color: var(--accent);
  }

  .tap-hint {
    text-align: center; color: var(--muted); font-size: 13px;
    padding: 14px 0 6px;
  }

  /* Controls */
  .controls {
    margin-top: auto;
    padding: 16px 12px calc(16px + env(safe-area-inset-bottom));
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  button {
    font-family: inherit;
    border: none;
    border-radius: 14px;
    padding: 16px;
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    background: var(--card);
    cursor: pointer;
    transition: transform 0.08s, opacity 0.1s;
  }
  button:active { transform: scale(0.97); opacity: 0.85; }
  button.full { grid-column: 1 / -1; }
  button.primary { background: var(--accent); color: #0f172a; }
  button.danger { color: #f87171; }

  /* Winner banner */
  .banner {
    margin: 8px 12px 0;
    background: linear-gradient(135deg, var(--accent), var(--accent-dark));
    color: #0f172a;
    border-radius: 18px;
    padding: 18px;
    text-align: center;
    font-weight: 800;
    font-size: 18px;
    display: none;
  }
  .banner.show { display: block; }

  /* Setup modal */
  .modal {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    display: none;
    align-items: center; justify-content: center;
    padding: 20px;
    z-index: 10;
  }
  .modal.show { display: flex; }
  .modal-card {
    background: var(--card);
    border-radius: 20px;
    padding: 22px;
    width: 100%;
    max-width: 420px;
  }
  .modal-card h2 { font-size: 18px; margin-bottom: 16px; text-align: center; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .field input {
    width: 100%; padding: 13px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);
    background: #0f172a; color: var(--text); font-size: 16px; font-family: inherit;
  }
  .field input:focus { outline: none; border-color: var(--accent); }
  .seg { display: flex; gap: 8px; }
  .seg button {
    flex: 1; padding: 12px; font-size: 14px; background: #0f172a;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .seg button.active { background: var(--accent); color: #0f172a; border-color: var(--accent); }
</style>
</head>
<body>

<header>
  🎾 Padel Score
  <div class="sub" id="formatLabel"></div>
</header>

<div class="banner" id="banner"></div>

<div class="board">
  <div class="board-head">
    <span>Team</span>
    <div class="sets-cols" id="setHeaders">
      <span>Game</span>
      <span class="pts">Points</span>
    </div>
  </div>

  <div class="team-row top" id="rowA" onclick="addPoint(0)">
    <div class="team-info">
      <div class="serve-dot"></div>
      <div class="team-name" id="nameA">Team A</div>
    </div>
    <div class="scores" id="scoresA"></div>
  </div>

  <div class="team-row" id="rowB" onclick="addPoint(1)">
    <div class="team-info">
      <div class="serve-dot"></div>
      <div class="team-name" id="nameB">Team B</div>
    </div>
    <div class="scores" id="scoresB"></div>
  </div>
</div>

<div class="tap-hint">Tap the team that won the rally</div>

<div class="controls">
  <button class="full" onclick="undo()">↩︎ Undo</button>
  <button onclick="openSetup()">⚙︎ Settings</button>
  <button class="danger" onclick="resetMatch()">New match</button>
</div>

<!-- Setup modal -->
<div class="modal" id="setup">
  <div class="modal-card">
    <h2>New match</h2>
    <div class="field">
      <label>Team A</label>
      <input id="inA" type="text" placeholder="Team A" autocomplete="off">
    </div>
    <div class="field">
      <label>Team B</label>
      <input id="inB" type="text" placeholder="Team B" autocomplete="off">
    </div>
    <div class="field">
      <label>Number of sets</label>
      <div class="seg" id="segSets">
        <button data-val="1">1 set</button>
        <button data-val="3" class="active">Best of 3</button>
        <button data-val="5">Best of 5</button>
      </div>
    </div>
    <div class="field">
      <label>Golden point (no-ad: at 40–40 the next rally decides the game)</label>
      <div class="seg" id="segGold">
        <button data-val="0" class="active">No (with ad)</button>
        <button data-val="1">Yes (golden)</button>
      </div>
    </div>
    <div class="field">
      <label>Final set</label>
      <div class="seg" id="segFinal">
        <button data-val="set" class="active">Regular set</button>
        <button data-val="tb">Super tie-break (to 10)</button>
      </div>
    </div>
    <button class="primary full" style="margin-top:6px" onclick="startMatch()">Start match</button>
  </div>
</div>

<script>
const PTS = ['0', '15', '30', '40'];

let state = null;
let history = [];

function defaultConfig() {
  return { nameA: 'Team A', nameB: 'Team B', setsToWin: 2, totalSets: 3, gold: false, finalTb: false };
}

function newState(cfg) {
  return {
    cfg,
    points: [0, 0],      // index into PTS, or 'A' for advantage handled separately
    adv: -1,             // -1 none, 0 team A has advantage, 1 team B
    games: [0, 0],       // games in current set
    sets: [[], []],      // games won per finished set: sets[team] = [g1, g2, ...]
    setsWon: [0, 0],
    server: 0,           // which team serves
    inTiebreak: false,
    tbPoints: [0, 0],
    finished: false,
    winner: -1,
  };
}

// ---- scoring logic ----
function addPoint(team) {
  if (!state || state.finished) return;
  history.push(JSON.stringify(state));
  if (history.length > 100) history.shift();

  if (state.inTiebreak) {
    tiebreakPoint(team);
  } else {
    regularPoint(team);
  }
  save();
  render();
}

function regularPoint(team) {
  const other = 1 - team;
  const p = state.points;

  // No-ad golden point at 40-40
  if (state.cfg.gold && p[0] === 3 && p[1] === 3) {
    winGame(team);
    return;
  }

  if (p[team] < 3) {
    p[team]++;
    if (p[team] === 3 && p[other] < 3) {
      // reached 40
    }
  } else {
    // team at 40
    if (p[other] < 3) {
      winGame(team);
    } else {
      // deuce / advantage
      if (state.adv === -1) {
        state.adv = team;
      } else if (state.adv === team) {
        winGame(team);
      } else {
        state.adv = -1; // back to deuce
      }
    }
  }
}

function winGame(team) {
  state.points = [0, 0];
  state.adv = -1;
  state.games[team]++;
  switchServer();

  const g = state.games;
  // win set: 6 games with 2 ahead, or 7 in a set tiebreak situation
  if ((g[team] >= 6 && g[team] - g[1 - team] >= 2)) {
    winSet(team);
  } else if (g[team] === 6 && g[1 - team] === 6) {
    startTiebreak();
  } else if (g[team] === 7 && g[1 - team] === 5) {
    winSet(team);
  }
}

function startTiebreak() {
  // Check if this should be a super tiebreak (final set)
  const totalSetsPlayed = state.setsWon[0] + state.setsWon[1];
  const isFinalSet = (totalSetsPlayed === state.cfg.totalSets - 1);
  state.inTiebreak = true;
  state.isSuperTb = state.cfg.finalTb && isFinalSet;
  state.tbPoints = [0, 0];
}

function tiebreakPoint(team) {
  state.tbPoints[team]++;
  // server switches after first point, then every 2 points
  const total = state.tbPoints[0] + state.tbPoints[1];
  if (total === 1 || (total > 1 && (total - 1) % 2 === 0)) {
    switchServer();
  }
  const target = state.isSuperTb ? 10 : 7;
  const t = state.tbPoints;
  if (t[team] >= target && t[team] - t[1 - team] >= 2) {
    // tiebreak (and set) won
    state.inTiebreak = false;
    if (state.isSuperTb) {
      // super tiebreak counts as the set
      state.games[team]++; // mark for record; treat as 1-0 set
    } else {
      state.games[team]++; // 7-6
    }
    winSet(team, true);
  }
}

function winSet(team, fromTb) {
  // record set games
  state.sets[0].push(state.games[0]);
  state.sets[1].push(state.games[1]);
  state.setsWon[team]++;
  state.games = [0, 0];
  state.inTiebreak = false;
  state.isSuperTb = false;
  state.tbPoints = [0, 0];

  if (state.setsWon[team] >= state.cfg.setsToWin) {
    state.finished = true;
    state.winner = team;
  }
}

function switchServer() {
  state.server = 1 - state.server;
}

// ---- undo ----
function undo() {
  if (history.length === 0) return;
  state = JSON.parse(history.pop());
  save();
  render();
}

// ---- render ----
function render() {
  const cfg = state.cfg;
  document.getElementById('nameA').textContent = cfg.nameA;
  document.getElementById('nameB').textContent = cfg.nameB;

  const fmt = cfg.totalSets === 1 ? '1 set' : 'Best of ' + cfg.totalSets;
  document.getElementById('formatLabel').textContent =
    fmt + (cfg.gold ? ' · golden point' : '') + (cfg.finalTb ? ' · super TB' : '');

  // set column headers
  const headers = document.getElementById('setHeaders');
  const finishedSets = state.sets[0].length;
  let hHtml = '';
  for (let i = 0; i < finishedSets; i++) hHtml += '<span>S' + (i + 1) + '</span>';
  hHtml += '<span>Game</span>';
  hHtml += '<span class="pts">Points</span>';
  headers.innerHTML = hHtml;

  renderTeam(0, 'scoresA');
  renderTeam(1, 'scoresB');

  // serving highlight
  document.getElementById('rowA').classList.toggle('serving', state.server === 0 && !state.finished);
  document.getElementById('rowB').classList.toggle('serving', state.server === 1 && !state.finished);

  // banner
  const banner = document.getElementById('banner');
  if (state.finished) {
    banner.classList.add('show');
    const wn = state.winner === 0 ? cfg.nameA : cfg.nameB;
    const score = state.sets[0].map((g, i) => state.sets[0][i] + '-' + state.sets[1][i]).join('  ');
    banner.innerHTML = '🏆 Winner: ' + wn + '<br><span style="font-size:14px;font-weight:600">' + score + '</span>';
  } else {
    banner.classList.remove('show');
  }
}

function renderTeam(team, elId) {
  const el = document.getElementById(elId);
  let html = '';
  // finished sets
  for (let i = 0; i < state.sets[team].length; i++) {
    html += '<div class="set-score">' + state.sets[team][i] + '</div>';
  }
  // current set games
  html += '<div class="set-score current">' + state.games[team] + '</div>';
  // current point score
  let pt;
  if (state.finished) {
    pt = '–';
  } else if (state.inTiebreak) {
    pt = state.tbPoints[team];
  } else if (state.adv === team) {
    pt = 'Ad';
  } else if (state.adv === (1 - team)) {
    pt = '–';
  } else {
    pt = PTS[state.points[team]];
  }
  html += '<div class="point-score">' + pt + '</div>';
  el.innerHTML = html;
}

// ---- setup ----
function setupSeg(id, cb) {
  document.querySelectorAll('#' + id + ' button').forEach(b => {
    b.onclick = () => {
      document.querySelectorAll('#' + id + ' button').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      cb(b.dataset.val);
    };
  });
}

let setupVals = { sets: '3', gold: '0', final: 'set' };
setupSeg('segSets', v => setupVals.sets = v);
setupSeg('segGold', v => setupVals.gold = v);
setupSeg('segFinal', v => setupVals.final = v);

function openSetup() {
  document.getElementById('inA').value = state ? state.cfg.nameA : '';
  document.getElementById('inB').value = state ? state.cfg.nameB : '';
  document.getElementById('setup').classList.add('show');
}

function startMatch() {
  const total = parseInt(setupVals.sets);
  const cfg = {
    nameA: document.getElementById('inA').value.trim() || 'Team A',
    nameB: document.getElementById('inB').value.trim() || 'Team B',
    totalSets: total,
    setsToWin: total === 1 ? 1 : Math.ceil(total / 2),
    gold: setupVals.gold === '1',
    finalTb: setupVals.final === 'tb',
  };
  state = newState(cfg);
  history = [];
  document.getElementById('setup').classList.remove('show');
  save();
  render();
}

function resetMatch() {
  if (!confirm('Start a new match? The current score will be reset.')) return;
  openSetup();
}

// ---- persistence ----
function save() {
  try {
    localStorage.setItem('padelState', JSON.stringify(state));
    localStorage.setItem('padelHistory', JSON.stringify(history.slice(-30)));
  } catch (e) {}
}

function load() {
  try {
    const s = localStorage.getItem('padelState');
    const h = localStorage.getItem('padelHistory');
    if (s) {
      state = JSON.parse(s);
      history = h ? JSON.parse(h) : [];
      render();
      return true;
    }
  } catch (e) {}
  return false;
}

// ---- init ----
if (!load()) {
  document.getElementById('setup').classList.add('show');
}
</script>
</body>
</html>
